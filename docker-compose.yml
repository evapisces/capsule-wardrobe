services:
  postgres:
    image: postgres:16-alpine
    container_name: capsule-wardrobe-db
    environment:
      POSTGRES_USER: capsule
      POSTGRES_PASSWORD: capsule
      POSTGRES_DB: capsule_wardrobe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capsule -d capsule_wardrobe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
