name: capsule-wardrobe-api
region: nyc
services:
  - name: api
    source_dir: /server
    github:
      repo: YOUR_GITHUB_USERNAME/capsule-wardrobe
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build && npx prisma migrate deploy
    run_command: node dist/index.js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3001
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 30
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${db.DATABASE_URL}
      - key: CLIENT_URL
        scope: RUN_TIME
        value: https://capsule-wardrobe.pages.dev   # replace with your actual Pages domain
      - key: R2_ACCOUNT_ID
        scope: RUN_TIME
        type: SECRET
      - key: R2_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: R2_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      - key: R2_BUCKET_NAME
        scope: RUN_TIME
        type: SECRET
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
databases:
  - name: db
    engine: PG
    version: "16"
    production: true
    cluster_name: capsule-wardrobe-db
